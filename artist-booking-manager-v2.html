  let headerHTML = `<div class="ws-header-cell name-col" style="background:var(--bg-root)">Artist</div>`;
  weekDates.forEach((d, i) => { const isT = isToday(d); headerHTML += `<div class="ws-header-cell ${isT ? 'ws-today-hdr' : ''}"><div style="font-weight:700">${WS_DAY_SHORT[i]}</div><div style="font-size:9px;color:${isT ? 'var(--accent)' : 'var(--text-ghost)'};margin-top:2px">${d.getDate()}.${MONTHS[d.getMonth()]}</div></div>`; });
  let rowsHTML = '';
  if (staffArtists.length === 0) {
    rowsHTML = `<div class="ws-empty">No artists assigned to <strong>${loc === 'weil' ? 'Weil am Rhein' : 'Achern'}</strong> yet.<br><button class="btn btn-primary btn-sm" style="margin-top:14px" onclick="showWorkAdminModal('${loc}')">cfg Setup Location</button></div>`;
  } else {
    staffArtists.forEach((artist, aIdx) => {
      const bgRow = aIdx % 2 === 0 ? 'var(--bg-row-even)' : 'var(--bg-row-odd)';
      const isInCouple = (cfg.couples || []).some(pair => pair.includes(artist.id));
      const dotColor = ARTIST_ST[artist.status]?.raw || '#64748b';
      rowsHTML += `<div class="ws-name-cell" style="background:${bgRow}" onclick="showWorkWeekModal('${artist.id}','${loc}')"><span class="artist-dot" style="background:${dotColor}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(artist.name)}</span>${isInCouple ? '<span class="ws-couple-badge">(heart)</span>' : ''}</div>`;
      weekDates.forEach((d) => {
        const dateStr = dateToStr(d); const status = getWorkStatus(artist.id, loc, d); const ws = WORK_STATUS[status];
        const isDefault = !getWorkEntry(artist.id, loc, d); const past = isPast(d); const isT = isToday(d);
        const cellBg = isDefault ? bgRow : ws.bg + '22';
        const leftBorder = isT ? '2px solid rgba(96,165,250,0.5)' : isDefault ? `1px solid ${ws.bg}30` : `1px solid ${ws.bg}55`;
        rowsHTML += `<div class="ws-cell ${past ? 'ws-past' : ''} ${isT ? 'ws-today-col' : ''}" style="background:${cellBg};border-left:${leftBorder}" onclick="${past ? '' : `showWorkDayModal('${artist.id}','${loc}','${dateStr}')`}"><span style="font-size:${isDefault ? '16px' : '14px'};line-height:1;color:${isDefault ? 'var(--text-ghost)' : ws.bg}">${isDefault ? '.' : ws.icon}</span><span style="font-size:9px;font-weight:700;color:${isDefault ? 'var(--text-ghost)' : ws.bg}">${ws.short}</span></div>`;
      });
    });
  }
  let totalsHTML = `<div class="ws-totals-label">Staff</div>`;
  weekDates.forEach(d => { const present = countPresent(loc, d); const oncall = staffIds.filter(id => getWorkStatus(id, loc, d) === 'oncall').length; const ok = present >= min || staffIds.length === 0; const isT = isToday(d); totalsHTML += `<div class="ws-totals-row-cell ${!ok ? 'warn' : ''}" style="${isT ? 'border-left:2px solid rgba(96,165,250,0.5)' : ''}"><span style="color:${ok ? 'var(--green)' : 'var(--red)'}">${staffIds.length > 0 ? `${present}${!ok ? ' (!)' : ''}` : '-'}</span>${oncall > 0 ? `<span style="color:#f97316;font-size:8px;font-weight:600">+${oncall}[tel]</span>` : ''}</div>`; });
  const criticalDays = staffIds.length > 0 ? weekDates.filter(d => countPresent(loc, d) < min).length : 0;
  const totalOncall = weekDates.reduce((sum, d) => sum + staffIds.filter(id => getWorkStatus(id, loc, d) === 'oncall').length, 0);
  const summaryHTML = staffArtists.length > 0 ? `<div class="ws-summary"><div class="ws-summary-card"><div class="ws-summary-label">Min. Staff / day</div><div class="ws-summary-val" style="color:var(--accent)">${min}</div></div><div class="ws-summary-card"><div class="ws-summary-label">Artists assigned</div><div class="ws-summary-val" style="color:var(--text)">${staffIds.length}</div></div><div class="ws-summary-card"><div class="ws-summary-label">On-call this week</div><div class="ws-summary-val" style="color:var(--orange)">${totalOncall}</div></div><div class="ws-summary-card"><div class="ws-summary-label">Critical days</div><div class="ws-summary-val" style="color:${criticalDays > 0 ? 'var(--red)' : 'var(--green)'}">${criticalDays}</div></div></div><div class="hint">Click artist name -> week view . Click cell -> change day status . (heart) = couple . Past days are locked</div>` : '';
  return `<div class="ws-nav"><div class="ws-left">${locTabs}${weekNav}</div><button class="btn btn-secondary btn-sm" onclick="showWorkAdminModal('${loc}')">cfg Manage</button></div>${legend}<div class="ws-grid-wrap"><div class="ws-grid" style="grid-template-columns:${cols}">${headerHTML}${rowsHTML}${staffArtists.length > 0 ? totalsHTML : ''}</div></div>${summaryHTML}`;
}

// --- MODULE 3: TODO View ---
function renderTodoView() {
  const todos = state.todos;
  const total = todos.length;
  const done = todos.filter(t => t.status === 'erledigt').length;
  const open = todos.filter(t => t.status === 'Offen').length;
  const inProgress = todos.filter(t => t.status === 'In Arbeit').length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  // Filter
  let filtered = [...todos];
  const f = state.todoFilter;
  if (f.priority !== 'all') filtered = filtered.filter(t => t.priority === f.priority);
  if (f.kategorie !== 'all') filtered = filtered.filter(t => t.kategorie === f.kategorie);
  if (f.status !== 'all') filtered = filtered.filter(t => t.status === f.status);
  if (f.person !== 'all') filtered = filtered.filter(t => t.zustaendig === f.person);
  if (f.search) { const s = f.search.toLowerCase(); filtered = filtered.filter(t => (t.aufgabe||'').toLowerCase().includes(s) || (t.notizen||'').toLowerCase().includes(s) || (t.kategorie||'').toLowerCase().includes(s)); }
  if (state.todoHideCompleted) filtered = filtered.filter(t => t.status !== 'erledigt');

  // Sort
  const prioOrder = { A: 1, B: 2, C: 3, D: 4, E: 5, P: 6 };
  const { field, dir } = state.todoSort;
  filtered.sort((a, b) => {
    let va, vb;
    if (field === 'priority') { va = prioOrder[a.priority] || 99; vb = prioOrder[b.priority] || 99; }
    else { va = (a[field] || '').toString().toLowerCase(); vb = (b[field] || '').toString().toLowerCase(); }
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return dir === 'asc' ? cmp : -cmp;
  });

  // Unique values for filters
  const kategorien = [...new Set(todos.map(t => t.kategorie).filter(Boolean))].sort();
  const personen = [...new Set(todos.map(t => t.zustaendig).filter(Boolean))].sort();

  const arrow = (f2) => state.todoSort.field === f2 ? (state.todoSort.dir === 'asc' ? ' ▲' : ' ▼') : '';

  // Dashboard
  const dashboard = `<div class="todo-dashboard">
    <div class="todo-stat"><div class="todo-stat-label">Gesamt</div><div class="todo-stat-val" style="color:var(--accent)">${total}</div></div>
    <div class="todo-stat"><div class="todo-stat-label">Fortschritt</div><div class="todo-stat-val" style="color:var(--green)">${pct}%</div><div class="todo-progress"><div class="todo-progress-bar" style="width:${pct}%"></div></div></div>
    <div class="todo-stat"><div class="todo-stat-label">Offen</div><div class="todo-stat-val" style="color:var(--red)">${open}</div></div>
    <div class="todo-stat"><div class="todo-stat-label">In Arbeit</div><div class="todo-stat-val" style="color:var(--yellow)">${inProgress}</div></div>
    <div class="todo-stat"><div class="todo-stat-label">Erledigt</div><div class="todo-stat-val" style="color:var(--green)">${done}</div></div>
  </div>`;

  // Filters
  const katOpts = `<option value="all">Alle Kategorien</option>${kategorien.map(k => `<option value="${esc(k)}" ${f.kategorie === k ? 'selected' : ''}>${esc(k)}</option>`).join('')}`;
  const persOpts = `<option value="all">Alle Personen</option>${personen.map(p => `<option value="${esc(p)}" ${f.person === p ? 'selected' : ''}>${esc(p)}</option>`).join('')}`;
  const prioOpts = `<option value="all">Alle Prios</option>${['A','B','C','D','E','P'].map(p => `<option value="${p}" ${f.priority === p ? 'selected' : ''}>${p}</option>`).join('')}`;
  const statusOpts = `<option value="all">Alle Status</option><option value="Offen" ${f.status === 'Offen' ? 'selected' : ''}>Offen</option><option value="In Arbeit" ${f.status === 'In Arbeit' ? 'selected' : ''}>In Arbeit</option><option value="erledigt" ${f.status === 'erledigt' ? 'selected' : ''}>Erledigt</option>`;

  const filters = `<div class="todo-filters">
    <input type="text" placeholder="Suche..." value="${esc(f.search)}" oninput="setTodoFilter('search',this.value)">
    <select onchange="setTodoFilter('priority',this.value)">${prioOpts}</select>
    <select onchange="setTodoFilter('kategorie',this.value)">${katOpts}</select>
    <select onchange="setTodoFilter('status',this.value)">${statusOpts}</select>
    <select onchange="setTodoFilter('person',this.value)">${persOpts}</select>
    <label class="todo-check"><input type="checkbox" ${state.todoHideCompleted ? 'checked' : ''} onchange="toggleHideCompleted()"> Erledigte ausblenden</label>
    <span class="todo-count">${filtered.length} / ${total} Aufgaben</span>
    <button class="btn btn-primary btn-sm" onclick="showTodoModal()" style="margin-left:auto">+ Neue Aufgabe</button>
  </div>`;

  if (total === 0) {
    return `${dashboard}${filters}<div class="todo-empty"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Noch keine Aufgaben</div><div style="font-size:12px;margin-bottom:16px">Erstelle Aufgaben oder importiere die Standard-Daten</div><button class="todo-import-btn" onclick="importDefaultTodos()">📥 Standard-Daten importieren</button></div>`;
  }

  // Table rows
  const statusCls = (s) => s === 'erledigt' ? 'todo-status-erledigt' : s === 'In Arbeit' ? 'todo-status-arbeit' : 'todo-status-offen';
  const deadlineCls = (dl, status) => {
    if (!dl || status === 'erledigt') return 'todo-deadline-ok';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dl + 'T00:00:00');
    const diff = (d - today) / 86400000;
    if (diff < 0) return 'todo-deadline-overdue';
    if (diff <= 7) return 'todo-deadline-soon';
    return 'todo-deadline-ok';
  };
  const rows = filtered.map(t => {
    const isDone = t.status === 'erledigt';
    const dlCls = deadlineCls(t.deadline, t.status);
    const hasNotes = t.notizen && t.notizen.trim();
    return `<tr class="${isDone ? 'todo-done' : ''}">
      <td><span class="todo-prio todo-prio-${t.priority || 'E'}">${esc(t.priority || '-')}</span></td>
      <td>${t.kategorie ? `<span class="todo-kategorie-badge">${esc(t.kategorie)}</span>` : '<span style="color:var(--text-ghost)">-</span>'}</td>
      <td class="todo-aufgabe-cell" onclick="showTodoEditModal('${t.id}','aufgabe')">${esc(t.aufgabe || '-')}</td>
      <td class="${dlCls}" style="white-space:nowrap;font-size:12px">${esc(t.deadline || '-')}</td>
      <td><span class="todo-person-badge">${esc(t.zustaendig || '-')}</span></td>
      <td><button class="todo-status ${statusCls(t.status)}" onclick="toggleTodoStatus('${t.id}')">${esc(t.status || 'Offen')}</button></td>
      <td class="todo-notizen-cell" onclick="this.querySelector('.todo-notizen-text')?.classList.toggle('expanded')" title="${esc(t.notizen || '')}"><div class="todo-notizen-text">${hasNotes ? esc(t.notizen) : '<span style="color:var(--text-ghost)">-</span>'}</div></td>
      <td><div class="todo-actions"><button class="todo-action-btn" onclick="showTodoModal(state.todos.find(x=>x.id==='${t.id}'))" title="Bearbeiten">✏️</button><button class="todo-action-btn" onclick="if(confirm('Aufgabe l\u00f6schen?'))deleteTodo('${t.id}')" title="L\u00f6schen">🗑️</button></div></td>
    </tr>`;
  }).join('');

  const table = `<div class="todo-table-wrap"><table class="todo-table">
    <thead><tr>
      <th onclick="setTodoSort('priority')" style="width:50px">Prio${arrow('priority')}</th>
      <th onclick="setTodoSort('kategorie')" style="width:100px">Kategorie${arrow('kategorie')}</th>
      <th onclick="setTodoSort('aufgabe')">Aufgabe${arrow('aufgabe')}</th>
      <th onclick="setTodoSort('deadline')" style="width:80px">Deadline${arrow('deadline')}</th>
      <th onclick="setTodoSort('zustaendig')" style="width:90px">Zuständig${arrow('zustaendig')}</th>
      <th onclick="setTodoSort('status')" style="width:80px">Status${arrow('status')}</th>
      <th style="width:160px">Notizen</th>
      <th style="width:60px"></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;

  return `${dashboard}${filters}${table}`;
}

  const html = `
    <div class="modal-header"><div class="modal-title">${isNew ? 'Neue Aufgabe' : 'Aufgabe bearbeiten'}</div><button class="modal-close" onclick="closeModal(this.closest('.overlay'))">x</button></div>

async function importDefaultTodos() {
  if (!confirm('Standard-Daten importieren? (' + DEFAULT_TODOS.length + ' Aufgaben)')) return;
  toast('Importiere ' + DEFAULT_TODOS.length + ' Aufgaben...', 'info');
  const batch = db.batch();
  DEFAULT_TODOS.forEach(t => {
    const ref = db.collection('todos').doc();
    batch.set(ref, {
      priority: t.p, kategorie: t.k, aufgabe: t.a, deadline: t.d,
      zustaendig: t.z, status: t.s, notizen: t.n,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  });
  await batch.commit();
  toast(DEFAULT_TODOS.length + ' Aufgaben importiert!', 'success');
}

async function loadFinanceData() {
  if (state.financeData && !state.financeData._stale) return;
  state.financeLoading = true;
  render();
  try {
    const [calRev, artRev, actRev, bankSum, finOv] = await Promise.all([
      db.collection('calendarRevenue').get(),
      db.collection('artistRevenue').get(),
      db.collection('actualRevenue').get(),
      db.collection('bankSummary').get(),
      db.collection('financialOverview').get()
    ]);
    const toArr = snap => snap.docs.map(d => ({ id: d.id, ...d.data() }));
    state.financeData = {
      calendarRevenue: toArr(calRev),
      artistRevenue: toArr(artRev),
      actualRevenue: toArr(actRev),
      bankSummary: toArr(bankSum),
      financialOverview: toArr(finOv),
      _ts: Date.now()
    };
  } catch (e) {
    console.error('Finance load error:', e);
    state.financeData = { calendarRevenue: [], artistRevenue: [], actualRevenue: [], bankSummary: [], financialOverview: [], _error: e.message };
  }
  state.financeLoading = false;
  render();
}

const MONTH_NAMES_DE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MONTH_SHORT_DE = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function eurFmt(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
}

function numFmt(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('de-DE');
}

function toggleFinDetail(key) {
  state.financeDetail = state.financeDetail === key ? null : key;
  render();
}

function setFinMonth(dir) {
  state.financeMonth = Math.max(0, Math.min(11, state.financeMonth + dir));
  state.financeDetail = null;
  render();
}

function finGetOverview(m) {
  if (!state.financeData) return null;
  return state.financeData.financialOverview.find(r => r.month === m && r.year === new Date().getFullYear()) || null;
}

function finGetBank(m) {
  if (!state.financeData) return null;
  return state.financeData.bankSummary.find(r => r.month === m && r.year === new Date().getFullYear()) || null;
}

function finGetActual(m, loc) {
  if (!state.financeData) return null;
  return state.financeData.actualRevenue.find(r => r.month === m && r.year === new Date().getFullYear() && (!loc || r.location === loc)) || null;
}

function finGetCalendar(m, loc) {
  if (!state.financeData) return [];
  return state.financeData.calendarRevenue.filter(r => r.month === m && (!loc || r.location === loc));
}

function finGetArtists(m) {
  if (!state.financeData) return [];
  return state.financeData.artistRevenue.filter(r => r.month === m).sort((a, b) => (b.totalRevenue || 0) - (a.totalRevenue || 0));
}

// -- Badge for liquidity --
function liquidityBadge(status) {
  if (!status) return '<span class="fin-badge fin-badge-yellow">Keine Daten</span>';
  const s = status.toLowerCase();
  if (s.includes('gut') || s.includes('positiv') || s.includes('good')) return `<span class="fin-badge fin-badge-green">${status}</span>`;
  if (s.includes('kritisch') || s.includes('negativ') || s.includes('bad')) return `<span class="fin-badge fin-badge-red">${status}</span>`;
  return `<span class="fin-badge fin-badge-yellow">${status}</span>`;
}

// -- Expense color palette --
function expenseColor(i) {
  const colors = ['#60a5fa','#f472b6','#a78bfa','#fb923c','#34d399','#fbbf24','#e879f9','#38bdf8','#f87171','#4ade80'];
  return colors[i % colors.length];
}

// -- Month Chart (6 months) --
function renderFinMonthChart(m) {
  const year = new Date().getFullYear();
  const now = new Date().getMonth();
  // Show 3 before + current + 2 after (clamped to 0-11)
  const start = Math.max(0, m - 3);
  const end = Math.min(11, m + 2);
  const months = [];
  for (let i = start; i <= end; i++) months.push(i);

  // Gather values
  const vals = months.map(mi => {
    const ov = state.financeData.financialOverview.find(r => r.month === mi && r.year === year);
    const actual = ov ? (ov.actualRevenue_total || 0) : 0;
    const expected = ov ? (ov.expectedRevenue_total || 0) : 0;
    return { month: mi, actual, expected, value: mi <= now ? actual : expected };
  });
  const maxVal = Math.max(...vals.map(v => v.value), 1);

  const bars = vals.map(v => {
    const pct = Math.round((v.value / maxVal) * 100);
    let color = 'rgba(100,116,139,.35)'; // future = gray
    if (v.month < now) color = 'var(--green)';
    if (v.month === now) color = 'var(--accent)';
    const isCurrent = v.month === m;
    return `
    <div class="fin-bar-col">
      <div class="fin-bar-amount">${v.value > 0 ? eurFmt(v.value) : ''}</div>
      <div class="fin-bar" style="height:${Math.max(pct, 3)}%;background:${color};${isCurrent ? 'box-shadow:0 0 8px rgba(96,165,250,.4);' : ''}"></div>
      <div class="fin-bar-label" style="${isCurrent ? 'color:#e2e8f0;font-weight:600' : ''}">${MONTH_SHORT_DE[v.month]}</div>
    </div>`;
  }).join('');

  return `
  <div class="fin-section">
    <div class="fin-section-title">\ud83d\udcc8 Monatsverlauf</div>
    <div style="display:flex;gap:.75rem;font-size:.6rem;color:#64748b;margin-bottom:.35rem">
      <span>\u25cf <span style="color:var(--green)">Tatsächlich</span></span>
      <span>\u25cf <span style="color:var(--accent)">Aktuell</span></span>
      <span>\u25cf <span style="color:rgba(100,116,139,.6)">Erwartet</span></span>
    </div>
    <div class="fin-bars">${bars}</div>
  </div>`;
}

// -- Was kommt rein? (next 7 days) --
function renderFinUpcoming(m) {
  const now = new Date();
  const calData = state.financeData.calendarRevenue.filter(r => r.month === m);
  // Collect upcoming events from calendar data
  let upcoming = [];
  calData.forEach(r => {
    if (!r.events) return;
    let events = r.events;
    if (typeof events === 'string') {
      try { events = JSON.parse(events); } catch(e) { return; }
    }
    if (!Array.isArray(events)) return;
    events.forEach(ev => {
      const d = ev.start || ev.date || ev.startDate;
      if (!d) return;
      const evDate = new Date(d);
      const diffDays = (evDate - now) / (1000 * 60 * 60 * 24);
      if (diffDays >= 0 && diffDays <= 7) {
        upcoming.push({ date: evDate, title: ev.title || ev.summary || 'Termin', revenue: ev.revenue || ev.price || 0, location: r.location });
      }
    });
  });

  // Also try parsing eventsJson if events array was empty
  calData.forEach(r => {
    if (r.eventsJson && (!r.events || !r.events.length)) {
      try {
        const parsed = JSON.parse(r.eventsJson);
        if (Array.isArray(parsed)) {
          parsed.forEach(ev => {
            const d = ev.start || ev.date || ev.startDate;
            if (!d) return;
            const evDate = new Date(d);
            const diffDays = (evDate - now) / (1000 * 60 * 60 * 24);
            if (diffDays >= 0 && diffDays <= 7) {
              upcoming.push({ date: evDate, title: ev.title || ev.summary || 'Termin', revenue: ev.revenue || ev.price || 0, location: r.location });
            }
          });
        }
      } catch(e) { /* skip */ }
    }
  });

  // Deduplicate by title+date
  const seen = new Set();
  upcoming = upcoming.filter(u => {
    const key = u.title + u.date.toISOString().slice(0,10);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  upcoming.sort((a, b) => a.date - b.date);
  const dayFmt = d => d.toLocaleDateString('de-DE', { weekday: 'short', day: 'numeric', month: 'short' });

  if (!upcoming.length) {
    return `<div class="fin-section">
      <div class="fin-section-title">\ud83d\udcc5 Was kommt rein? <span style="font-weight:400;color:#64748b;font-size:.7rem">(nächste 7 Tage)</span></div>
      <div class="fin-empty">Keine anstehenden Termine mit Umsatz</div>
    </div>`;
  }

  const total = upcoming.reduce((s, u) => s + (u.revenue || 0), 0);
  const rows = upcoming.slice(0, 12).map(u => `
    <div class="fin-upcoming">
      <div class="fin-upcoming-date">${dayFmt(u.date)}</div>
      <div class="fin-upcoming-info">${u.title} <span style="color:#475569;font-size:.65rem">${u.location === 'achern' ? 'AC' : 'WE'}</span></div>
      <div class="fin-upcoming-amount">${u.revenue > 0 ? eurFmt(u.revenue) : '—'}</div>
    </div>`).join('');

  return `
  <div class="fin-section">
    <div class="fin-section-title">\ud83d\udcc5 Was kommt rein? <span style="font-weight:400;color:#64748b;font-size:.7rem">(nächste 7 Tage · ${eurFmt(total)} erwartet)</span></div>
    ${rows}
  </div>`;
}

const CONTRACT_CATEGORY_COLOR = {
  'Miete': '#a78bfa', 'Energie': '#eab308', 'Versicherung': '#60a5fa',
  'Fahrzeug': '#22d3ee', 'Telekommunikation': '#22c55e', 'Marketing': '#ec4899',
  'Software': '#818cf8', 'Buchhaltung': '#94a3b8', 'Sonstiges': '#64748b',
  'Studio': '#f97316'
};
const CONTRACT_FLAG_META = {
  'none':        { label: 'Normal',          color: '#475569', icon: '•'  },
  'review':      { label: 'Zu prüfen',       color: '#f97316', icon: '🟠' },
  'soon_cancel': { label: 'Baldige Kündigung', color: '#eab308', icon: '🟡' },
  'cancelled':   { label: 'Gekündigt',       color: '#ef4444', icon: '🔴' }
};

function getContractNote(id) { return state.contractNotes[id] || null; }
function effectiveStatus(c) {
  const note = getContractNote(c.id);
  if (note?.flag === 'cancelled') return 'gekuendigt';
  return c.status;
}
function monthlyEquivalent(c) {
  if (!c.amount) return 0;
  if (c.frequency === 'monatlich') return c.amount;
  if (c.frequency === 'vierteljährlich') return c.amount / 3;
  if (c.frequency === 'jährlich') return c.amount / 12;
  if (c.frequency === 'variabel') return c.amount;
  return 0;
}
function fmtEur(n) { return (n || 0).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €'; }

function visibleContracts() {
  const f = state.contractFilter;
  return CONTRACTS.filter(c => {
    const note = getContractNote(c.id);
    if (state.contractHideHidden && note?.hidden) return false;
    if (f.category !== 'all' && c.category !== f.category) return false;
    if (f.status !== 'all') {
      const s = effectiveStatus(c);
      if (f.status === 'flagged' && (!note || !note.flag || note.flag === 'none')) return false;
      else if (f.status !== 'flagged' && s !== f.status) return false;
    }
    if (f.frequency !== 'all' && c.frequency !== f.frequency) return false;
    if (f.search) {
      const q = f.search.toLowerCase();
      if (!(c.company + ' ' + c.description).toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function setContractFilter(key, val) { state.contractFilter[key] = val; render(); }
function toggleContractHideHidden() { state.contractHideHidden = !state.contractHideHidden; render(); }

async function saveContractNote(id, partial) {
  const existing = state.contractNotes[id] || {};
  const merged = { ...existing, ...partial, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  try {
    await db.collection('contractNotes').doc(id).set(merged, { merge: true });
    toast('Gespeichert', 'success');
  } catch (e) {
    toast('Fehler beim Speichern: ' + e.message, 'error');
  }
}

function renderContractsView() {
  const f = state.contractFilter;
  const visible = visibleContracts();

  const totalMonthly = visible.reduce((s, c) => {
    if (effectiveStatus(c) === 'gekuendigt') return s;
    return s + monthlyEquivalent(c);
  }, 0);
  const totalYearly = totalMonthly * 12;

  const flagged = CONTRACTS.filter(c => { const n = getContractNote(c.id); return n?.flag && n.flag !== 'none'; });
  const soonCancel = flagged.filter(c => getContractNote(c.id).flag === 'soon_cancel').length;
  const cancelled = flagged.filter(c => getContractNote(c.id).flag === 'cancelled').length;
  const review = flagged.filter(c => getContractNote(c.id).flag === 'review').length;
  const hiddenCount = CONTRACTS.filter(c => getContractNote(c.id)?.hidden).length;

  // KPIs
  const kpis = `
    <div class="ct-kpis">
      <div class="ct-kpi"><div class="ct-kpi-label">Sichtbar</div><div class="ct-kpi-value">${visible.length} <span style="font-size:11px;color:var(--text-faint);font-weight:500">/ ${CONTRACTS.length}</span></div></div>
      <div class="ct-kpi"><div class="ct-kpi-label">Monatlich</div><div class="ct-kpi-value" style="color:var(--accent)">${fmtEur(totalMonthly)}</div></div>
      <div class="ct-kpi"><div class="ct-kpi-label">Jährlich</div><div class="ct-kpi-value" style="color:var(--accent-purple)">${fmtEur(totalYearly)}</div></div>
      ${review > 0 ? `<div class="ct-kpi ct-kpi-btn" onclick="setContractFilter('status','flagged')"><div class="ct-kpi-label">🟠 Zu prüfen</div><div class="ct-kpi-value" style="color:#f97316">${review}</div></div>` : ''}
      ${soonCancel > 0 ? `<div class="ct-kpi ct-kpi-btn" onclick="setContractFilter('status','flagged')"><div class="ct-kpi-label">🟡 Kündigung</div><div class="ct-kpi-value" style="color:#eab308">${soonCancel}</div></div>` : ''}
      ${cancelled > 0 ? `<div class="ct-kpi ct-kpi-btn" onclick="setContractFilter('status','flagged')"><div class="ct-kpi-label">🔴 Gekündigt</div><div class="ct-kpi-value" style="color:var(--red)">${cancelled}</div></div>` : ''}
    </div>
  `;

  // Category pills
  const categories = [...new Set(CONTRACTS.map(c => c.category))].sort();
  const catPills = `
    <div class="ct-cats">
      <button class="ct-pill ${f.category === 'all' ? 'active' : ''}" onclick="setContractFilter('category','all')">Alle</button>
      ${categories.map(cat => `<button class="ct-pill ${f.category === cat ? 'active' : ''}" onclick="setContractFilter('category','${cat}')" style="--pill-color:${CONTRACT_CATEGORY_COLOR[cat]}">${cat}</button>`).join('')}
    </div>
  `;

  // Filter row
  const filterRow = `
    <div class="ct-filters">
      <select onchange="setContractFilter('status', this.value)">
        <option value="all" ${f.status==='all'?'selected':''}>Alle Status</option>
        <option value="aktiv" ${f.status==='aktiv'?'selected':''}>Aktiv</option>
        <option value="umstellung" ${f.status==='umstellung'?'selected':''}>Umstellung</option>
        <option value="flagged" ${f.status==='flagged'?'selected':''}>Markiert (Flag)</option>
      </select>
      <select onchange="setContractFilter('frequency', this.value)">
        <option value="all" ${f.frequency==='all'?'selected':''}>Alle Frequenzen</option>
        <option value="monatlich" ${f.frequency==='monatlich'?'selected':''}>Monatlich</option>
        <option value="vierteljährlich" ${f.frequency==='vierteljährlich'?'selected':''}>Vierteljährlich</option>
        <option value="jährlich" ${f.frequency==='jährlich'?'selected':''}>Jährlich</option>
        <option value="variabel" ${f.frequency==='variabel'?'selected':''}>Variabel</option>
      </select>
      <input type="text" placeholder="🔍 Suche Firma oder Leistung..." value="${esc(f.search)}" oninput="setContractFilter('search', this.value)">
      <label class="ct-toggle">
        <input type="checkbox" ${state.contractHideHidden ? 'checked' : ''} onchange="toggleContractHideHidden()">
        Ausgeblendete verstecken${hiddenCount > 0 ? ` (${hiddenCount})` : ''}
      </label>
    </div>
  `;

  // Sort: by effective status (cancelled last), then by monthly equivalent desc
  const sorted = [...visible].sort((a, b) => {
    const sa = effectiveStatus(a) === 'gekuendigt' ? 1 : 0;
    const sb = effectiveStatus(b) === 'gekuendigt' ? 1 : 0;
    if (sa !== sb) return sa - sb;
    return monthlyEquivalent(b) - monthlyEquivalent(a);
  });

  // Rows
  const rows = sorted.map(c => {
    const note = getContractNote(c.id) || {};
    const isCancelled = effectiveStatus(c) === 'gekuendigt';
    const flag = note.flag || 'none';
    const flagMeta = CONTRACT_FLAG_META[flag];
    const catColor = CONTRACT_CATEGORY_COLOR[c.category] || '#64748b';
    return `
      <div class="ct-row ${isCancelled ? 'ct-row-cancelled' : ''}" onclick="showContractModal('${c.id}')">
        <div class="ct-row-main">
          <div class="ct-row-company">
            ${flag !== 'none' ? `<span title="${flagMeta.label}" style="margin-right:6px">${flagMeta.icon}</span>` : ''}
            ${esc(c.company)}
          </div>
          <div class="ct-row-desc">${esc(c.description || '—')}</div>
          ${note.text ? `<div class="ct-row-note">📝 ${esc(note.text)}</div>` : ''}
        </div>
        <div class="ct-row-meta">
          <span class="ct-badge ct-badge-cat" style="--cat-color:${catColor}">${c.category}</span>
          <span class="ct-badge ct-badge-status ct-status-${c.status}">${c.status}</span>
        </div>
        <div class="ct-row-amount">
          <div class="ct-amount">${fmtEur(c.amount)}</div>
          <div class="ct-freq">${c.frequency}</div>
        </div>
      </div>
    `;
  }).join('');

  const emptyState = visible.length === 0
    ? `<div style="text-align:center;padding:40px;color:var(--text-faint)">Keine Verträge für diese Filter. <button onclick="state.contractFilter={category:'all',status:'all',frequency:'all',search:''};render();" style="background:transparent;color:var(--accent);border:none;cursor:pointer;text-decoration:underline;margin-left:8px">Filter zurücksetzen</button></div>`
    : '';

  return `
    <div class="contracts-module">
      ${kpis}
      ${catPills}
      ${filterRow}
      <div class="ct-list">${rows}${emptyState}</div>
      <div style="margin-top:14px;color:var(--text-ghost);font-size:10px;text-align:center">
        66 Verträge · Klick auf Zeile für Notiz/Flag/Ausblenden · Gekündigt-markierte werden nicht in den Summen gerechnet
      </div>
    </div>
  `;
}
