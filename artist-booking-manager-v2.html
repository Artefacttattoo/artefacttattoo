<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Artefact Cockpit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg-root: #080d19;
  --bg-card: #0f172a;
  --bg-input: #1e293b;
  --bg-row-even: #0b1120;
  --bg-row-odd: #0f172a;
  --bg-hover: #162040;
  --border: #1e293b;
  --border-light: #151d30;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;
  --text-ghost: #334155;
  --accent: #60a5fa;
  --accent-purple: #a78bfa;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --orange: #f97316;
  --blue: #3b82f6;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-root); color: var(--text); -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg-root); }
::-webkit-scrollbar-thumb { background: var(--bg-input); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.header { padding: 14px 20px 0; background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-root) 100%); flex-shrink: 0; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.logo { font-size: 21px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { color: var(--text-ghost); font-size: 11px; margin-top: 1px; }
.stats { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.stat { background: var(--bg-row-even); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; flex: 1 1 90px; }
.stat-label { color: var(--text-ghost); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 20px; font-weight: 700; margin-top: 1px; }
.tabs { display: flex; gap: 0; overflow-x: auto; }
.tab { background: transparent; color: var(--text-faint); border: 1px solid transparent; border-bottom: 1px solid var(--border); border-radius: 8px 8px 0 0; padding: 8px 18px; cursor: pointer; font-size: 13px; font-weight: 600; margin-bottom: -1px; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
.tab.active { background: var(--bg-card); color: var(--accent); border: 1px solid var(--border); border-bottom-color: var(--bg-card); }
.tab-fill { flex: 1; border-bottom: 1px solid var(--border); }
.tab-sep { width: 1px; background: var(--border); margin: 6px 8px; align-self: stretch; border-bottom: 1px solid var(--border); }
.content { background: var(--bg-card); border: 1px solid var(--border); border-top: none; margin: 0 20px; border-radius: 0 0 10px 10px; padding: 14px 16px 16px; flex: 1; overflow: auto; min-height: 0; }
.month-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
.months { display: flex; gap: 3px; flex-wrap: wrap; }
.month-btn { background: var(--bg-input); color: var(--text-faint); border: none; border-radius: 5px; padding: 5px 8px; cursor: pointer; font-size: 11px; font-weight: 600; min-width: 34px; font-family: inherit; transition: all 0.12s; }
.month-btn.active { background: var(--blue); color: #fff; }
.filter-group { display: flex; gap: 4px; align-items: center; }
.filter-btn { background: var(--bg-input); color: var(--text-faint); border: 1px solid var(--text-ghost); border-radius: 5px; padding: 3px 10px; cursor: pointer; font-size: 10px; font-weight: 600; font-family: inherit; }
.filter-btn.active { background: var(--bg-hover); color: var(--accent); border-color: rgba(37,99,235,0.2); }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.grid-wrapper { overflow: auto; border-radius: var(--radius); border: 1px solid var(--border); }
.grid { display: grid; font-size: 11px; }
.grid-header { background: var(--bg-root); padding: 6px 0; text-align: center; font-weight: 500; font-size: 10px; color: var(--text-faint); border-bottom: 2px solid var(--border); }
.grid-header.weekend { color: var(--yellow); font-weight: 700; }
.grid-header.name-col { padding: 7px 10px; font-size: 13px; font-weight: 700; color: var(--text); text-align: left; position: sticky; left: 0; z-index: 2; }
.artist-name { padding: 5px 10px; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 5px; position: sticky; left: 0; z-index: 1; font-weight: 500; font-size: 12px; border-bottom: 1px solid var(--border-light); transition: background 0.15s; }
.artist-name:hover { background: var(--bg-hover) !important; }
.artist-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cell { border-bottom: 1px solid var(--border-light); border-right: 1px solid #0a0f1d; cursor: pointer; min-height: 22px; transition: opacity 0.1s; }
.cell.blocked { cursor: not-allowed; opacity: 0.45; background: repeating-linear-gradient(45deg, var(--text-ghost), var(--text-ghost) 2px, transparent 2px, transparent 4px) !important; }
.cell.confirmed { background: var(--green); }
.cell.tentative { background: var(--yellow); }
.cell.unavailable { background: var(--red); }
.cell.available { background: rgba(34,197,94,0.18); border: 1px solid rgba(34,197,94,0.3); }
.av-btn { font-size: 10px; cursor: pointer; color: var(--text-ghost); padding: 0 4px; flex-shrink: 0; transition: color 0.15s; }
.av-btn:hover { color: var(--green); }
.av-btn.av-set { color: var(--green); }
.hint { margin-top: 8px; color: var(--text-ghost); font-size: 9px; }
.pipeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.pipeline-title { font-size: 18px; font-weight: 700; }
.pipeline-sub { color: var(--text-faint); font-size: 12px; margin-top: 2px; }
.pipeline-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media (max-width: 900px) { .pipeline-board { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 520px) { .pipeline-board { grid-template-columns: 1fr; } }
.phase-col { background: var(--bg-row-even); border-radius: 10px; padding: 10px; border: 1px solid var(--border); transition: background 0.15s; min-height: 200px; }
.phase-col.dragover { background: var(--bg-hover); }
.phase-header { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.phase-icon { font-size: 16px; }
.phase-label { font-size: 12px; font-weight: 700; }
.phase-desc { color: var(--text-ghost); font-size: 9px; }
.phase-count { margin-left: auto; padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.candidate-card { background: var(--bg-card); border-radius: 8px; padding: 9px 11px; margin-bottom: 6px; border: 1px solid var(--border); cursor: grab; transition: border-color 0.15s, transform 0.1s; }
.candidate-card:hover { transform: translateY(-1px); }
.candidate-card.dragging { opacity: 0.5; }
.candidate-name { color: var(--text); font-size: 12px; font-weight: 600; }
.candidate-nat { color: var(--text-faint); font-size: 9px; background: var(--bg-input); padding: 1px 5px; border-radius: 4px; }
.candidate-spec { color: var(--text-muted); font-size: 10px; margin-top: 2px; }
.candidate-notes { color: var(--text-ghost); font-size: 9px; margin-top: 3px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.convert-btn { width: 100%; margin-top: 8px; padding: 5px 0; background: rgba(34,197,94,0.13); border: 1px solid rgba(34,197,94,0.27); color: var(--green); border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: inherit; transition: background 0.15s; }
.convert-btn:hover { background: rgba(34,197,94,0.22); }
.phase-empty { color: var(--border); font-size: 10px; text-align: center; padding: 16px 0; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.15s; }
.overlay.show { opacity: 1; }
.modal { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 25px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; max-height: 88vh; transform: translateY(10px); transition: transform 0.15s; }
.overlay.show .modal { transform: none; }
.modal-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
.modal-title { font-size: 20px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text-faint); font-size: 20px; cursor: pointer; }
.modal-tabs { display: flex; border-bottom: 1px solid var(--border); }
.modal-tab { background: none; border: none; padding: 9px 18px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; color: var(--text-faint); transition: all 0.12s; }
.modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.modal-body { overflow: auto; flex: 1; padding: 18px 22px; }
.modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 520px) { .form-grid { grid-template-columns: 1fr; } }
.field label { display: block; color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.field input, .field select, .field textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--text-ghost); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 60px; }
.btn { border: none; border-radius: var(--radius); padding: 10px 20px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all 0.12s; }
.btn-primary { background: linear-gradient(135deg, var(--blue), #6366f1); color: #fff; box-shadow: 0 2px 12px rgba(59,130,246,0.25); }
.btn-primary:hover { box-shadow: 0 4px 16px rgba(59,130,246,0.35); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: var(--bg-input); color: var(--text-dim); }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.status-group { display: flex; gap: 6px; }
.status-btn { flex: 1; padding: 7px 4px; border-radius: 6px; cursor: pointer; border: 2px solid var(--bg-input); background: var(--bg-input); font-size: 11px; font-weight: 600; font-family: inherit; transition: all 0.12s; }
.status-btn.active { border-width: 2px; }
.doc-row { display: flex; align-items: center; gap: 8px; background: var(--bg-input); border-radius: 6px; padding: 7px 12px; margin-bottom: 4px; }
.doc-name { color: var(--text); font-size: 12px; font-weight: 600; }
.doc-link { color: var(--accent); font-size: 10px; text-decoration: none; margin-left: 8px; }
.doc-remove { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; }
.doc-add-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.doc-add-row input { flex: 1; min-width: 100px; background: var(--bg-input); border: 1px solid var(--text-ghost); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; }
.history-row { display: flex; align-items: center; gap: 10px; background: var(--bg-input); border-radius: 6px; padding: 8px 12px; margin-bottom: 4px; }
.history-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.history-text { flex: 1; font-size: 12px; }
.history-badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
input[type=range] { width: 100%; accent-color: var(--blue); }
.alert { border-radius: var(--radius); padding: 9px 12px; margin-bottom: 14px; font-size: 12px; }
.alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
.alert-warning { background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.2); color: #fde68a; }
.alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
.toast { position: fixed; top: 20px; right: 20px; z-index: 2000; padding: 10px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.4); color: #fff; animation: toastIn 0.2s ease; }
.toast-success { background: #166534; }
.toast-error { background: #991b1b; }
.toast-warning { background: #854d0e; }
.toast-info { background: #1e3a5f; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.conn-dot.online { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
.conn-dot.offline { background: var(--red); }
.loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: var(--text-faint); font-size: 16px; }
.spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.ws-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.ws-left { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.ws-loc-tabs { display: flex; gap: 4px; }
.ws-loc-tab { background: var(--bg-input); color: var(--text-faint); border: 1px solid var(--text-ghost); border-radius: 6px; padding: 5px 14px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: all 0.12s; }
.ws-loc-tab.active { background: rgba(59,130,246,0.15); color: var(--accent); border-color: rgba(59,130,246,0.35); }
.ws-week-nav { display: flex; align-items: center; gap: 6px; }
.ws-week-label { font-size: 12px; font-weight: 600; color: var(--text); min-width: 130px; text-align: center; }
.ws-nav-btn { background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-family: inherit; font-size: 14px; transition: all 0.12s; }
.ws-nav-btn:hover { background: var(--bg-hover); color: var(--text); }
.ws-today-btn { background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); cursor: pointer; height: 28px; padding: 0 10px; font-size: 10px; font-weight: 600; font-family: inherit; transition: all 0.12s; }
.ws-today-btn:hover { color: var(--accent); }
.ws-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
.ws-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
.ws-legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.ws-grid-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
.ws-grid { display: grid; font-size: 11px; min-width: 480px; }
.ws-header-cell { background: var(--bg-root); padding: 8px 4px; text-align: center; font-weight: 600; font-size: 10px; color: var(--text-faint); border-bottom: 2px solid var(--border); line-height: 1.4; }
.ws-header-cell.name-col { text-align: left; padding: 8px 10px; font-size: 11px; position: sticky; left: 0; z-index: 2; }
.ws-header-cell.ws-today-hdr { color: var(--accent); }
.ws-name-cell { padding: 0 10px; font-size: 12px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--border-light); cursor: pointer; transition: background 0.12s; position: sticky; left: 0; z-index: 1; min-height: 44px; }
.ws-name-cell:hover { background: var(--bg-hover) !important; }
.ws-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-height: 44px; cursor: pointer; border-bottom: 1px solid var(--border-light); transition: filter 0.12s, transform 0.1s; }
.ws-cell:hover { filter: brightness(1.2); transform: scale(0.96); }
.ws-cell.ws-past { cursor: default; opacity: 0.4; }
.ws-cell.ws-past:hover { filter: none; transform: none; }
.ws-cell.ws-today-col { border-left: 2px solid rgba(96,165,250,0.5) !important; }
.ws-totals-row-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-height: 32px; border-top: 2px solid var(--border); border-bottom: none; border-left: 1px solid var(--border-light); background: var(--bg-root); font-size: 11px; font-weight: 700; }
.ws-totals-row-cell.warn { background: rgba(239,68,68,0.06); }
.ws-totals-label { padding: 0 10px; font-size: 10px; font-weight: 600; color: var(--text-ghost); border-top: 2px solid var(--border); background: var(--bg-root); display: flex; align-items: center; min-height: 32px; position: sticky; left: 0; z-index: 1; }
.ws-couple-badge { font-size: 9px; background: rgba(167,139,250,0.18); color: #a78bfa; border-radius: 4px; padding: 1px 5px; flex-shrink: 0; }
.ws-summary { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.ws-summary-card { background: var(--bg-row-even); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; flex: 1 1 90px; }
.ws-summary-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-ghost); }
.ws-summary-val { font-size: 18px; font-weight: 700; margin-top: 2px; }
.ws-status-option { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 8px; cursor: pointer; transition: background 0.12s; border: 2px solid transparent; margin-bottom: 6px; }
.ws-status-option:hover { background: var(--bg-hover); }
.ws-status-option.ws-sel { background: var(--bg-hover); }
.ws-status-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.ws-empty { grid-column: 1/-1; padding: 40px 20px; text-align: center; color: var(--text-ghost); font-size: 13px; line-height: 1.8; }

/* ===== MODULE 3: TODO ===== */
.todo-dashboard { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.todo-stat { background: var(--bg-row-even); border: 1px solid var(--border); border-radius: 12px; padding: 16px 22px; flex: 1 1 120px; }
.todo-stat-label { color: var(--text-ghost); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.todo-stat-val { font-size: 28px; font-weight: 700; margin-top: 4px; }
.todo-progress { height: 8px; background: var(--bg-input); border-radius: 4px; margin-top: 8px; overflow: hidden; }
.todo-progress-bar { height: 100%; background: linear-gradient(90deg, var(--green), #4ade80); border-radius: 4px; transition: width 0.3s; }
.todo-filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.todo-filters select, .todo-filters input[type=text] { background: var(--bg-input); border: 1px solid var(--text-ghost); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
.todo-filters select:focus, .todo-filters input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(96,165,250,0.15); }
.todo-filters input[type=text] { min-width: 180px; }
.todo-count { font-size: 13px; color: var(--text-faint); margin-left: auto; font-weight: 500; }
.todo-check { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-faint); cursor: pointer; }
.todo-check input { accent-color: var(--accent); cursor: pointer; width: 15px; height: 15px; }
.todo-table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
.todo-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 800px; }
.todo-table th { background: var(--bg-root); padding: 14px 16px; text-align: left; font-weight: 700; font-size: 12px; color: var(--text-muted); border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em; }
.todo-table th:hover { color: var(--accent); }
.todo-table th .sort-arrow { margin-left: 3px; font-size: 9px; }
.todo-table td { padding: 16px 16px; border-bottom: 1px solid var(--border-light); vertical-align: middle; line-height: 1.6; }
.todo-table tr:nth-child(even) td { background: var(--bg-row-even); }
.todo-table tr:nth-child(odd) td { background: var(--bg-row-odd); }

/* ---- Finance Tab ---- */

@keyframes fin-spin { to { transform: rotate(360deg); } }

<body>
<div id="app"></div>
<script>
// ===============================================================
// FIREBASE CONFIG
// ===============================================================
const firebaseConfig = {
  apiKey: "AIzaSyC0BNqBsDkepHc8ktlUZyW_mKIXbXX5nuM",
  authDomain: "artist-booking-manager.firebaseapp.com",
  projectId: "artist-booking-manager",
  storageBucket: "artist-booking-manager.firebasestorage.app",
  messagingSenderId: "741081977716",
  appId: "1:741081977716:web:31dfe2ea36652a63129221"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.enablePersistence({ synchronizeTabs: true }).catch(err => {
  console.warn('Offline persistence failed:', err.code);
});

// --- Constants ---
const MONTHS = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const DAYS = [31,28,31,30,31,30,31,31,30,31,30,31];
const STATUS = {
  confirmed: { bg: 'var(--green)', label: 'Fest gebucht', short: 'Fest', cls: 'confirmed' },
  tentative: { bg: 'var(--yellow)', label: 'Eventuell', short: 'Evt.', cls: 'tentative' },
  unavailable: { bg: 'var(--red)', label: 'Nicht verfügbar', short: 'N/V', cls: 'unavailable' },
  free: { bg: 'transparent', label: 'Frei', short: 'Frei', cls: '' },
};
const ARTIST_ST = {
  active: { color: 'var(--green)', label: 'Aktiv', raw: '#22c55e' },
  visa: { color: 'var(--yellow)', label: 'Visa-Prozess', raw: '#eab308' },
  archived: { color: 'var(--text-muted)', label: 'Archiv', raw: '#64748b' },
};
const PHASES = [
  { key: 'contacted', label: 'Kontaktiert', color: '#64748b', icon: '[mail]', desc: 'Erstanfrage gesendet' },
  { key: 'interested', label: 'Interessiert', color: '#3b82f6', icon: '[chat]', desc: 'Positive Rückmeldung' },
  { key: 'visa_applied', label: 'Visa beantragt', color: '#f59e0b', icon: '[list]', desc: 'Unterlagen eingereicht' },
  { key: 'visa_received', label: 'Visa erhalten', color: '#22c55e', icon: '[ok]', desc: 'Bereit zur Übernahme' },
];
const WORK_STATUS = {
  present: { bg: '#22c55e', label: 'Working', desc: 'Present at the studio', icon: '+', short: 'Work' },
  oncall: { bg: '#f97316', label: 'On-call', desc: 'At home . 20 min away', icon: '[tel]', short: 'Call' },
  off: { bg: '#ef4444', label: 'Day off', desc: 'Not available today', icon: 'x', short: 'Off' },
};
const WS_DAY_SHORT = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
const WS_DAY_FULL = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

// --- State ---
let state = {
  artists: [],
  bookings: {},
  pipeline: [],
  todos: [],
  tab: 'achern',
  month: new Date().getMonth(),
  filter: 'all',
  online: navigator.onLine,
  loaded: false,
  workSchedule: {},
  locationConfig: {},
  workTab: 'weil',
  workWeekStart: getMondayOfWeek(new Date()),
  todoFilter: { priority: 'all', kategorie: 'all', status: 'all', person: 'all', search: '' },
  todoSort: { field: 'priority', dir: 'asc' },
  todoHideCompleted: false,
  calendarRevenue: {},
  artistAvailability: {},
  financeData: null,
  financeDetail: null,
  financeMonth: new Date().getMonth(),
  financeLoading: false,
  contractNotes: {},
  contractFilter: { category: 'all', status: 'all', frequency: 'all', search: '' },
  contractHideHidden: true,
};

// --- Firebase Listeners ---
function initListeners() {
  db.collection('artists').orderBy('name').onSnapshot(snap => {
    state.artists = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (state.loaded) render();
  });
  db.collection('bookings').onSnapshot(snap => {
    const bk = { achern: {}, weil: {} };
    snap.docs.forEach(d => {
      const data = d.data();
      const loc = data.location;
      if (!bk[loc]) bk[loc] = {};
      const key = `${data.month}-${data.day}`;
      if (!bk[loc][key]) bk[loc][key] = [];
      bk[loc][key].push({ artistId: data.artistId, status: data.status, docId: d.id, revenue: data.revenue || 0, deposit: data.deposit || 0, source: data.source || '' });
    });
    state.bookings = bk;
    if (state.loaded) render();
  });
  db.collection('pipeline').orderBy('name').onSnapshot(snap => {
    state.pipeline = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (state.loaded) render();
  });
  db.collection('workSchedule').onSnapshot(snap => {
    const ws = {};
    snap.docs.forEach(d => { ws[d.id] = { ...d.data(), docId: d.id }; });
    state.workSchedule = ws;
    if (state.loaded) render();
  });
  db.collection('locationConfig').onSnapshot(snap => {
    const lc = {};
    snap.docs.forEach(d => { lc[d.id] = d.data(); });
    state.locationConfig = lc;
    if (state.loaded) render();
  });
  db.collection('todos').onSnapshot(snap => {
    state.todos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (state.loaded) render();
  });
  db.collection('artistAvailability').onSnapshot(snap => {
    const av = {};
    snap.docs.forEach(d => { const data = d.data(); const key = `${data.artistId}_${data.location}_${data.month}_${data.year || 2026}`; av[key] = { ...data, docId: d.id }; });
    state.artistAvailability = av;
    if (state.loaded) render();
  });
  db.collection('calendarRevenue').onSnapshot(snap => {
    const rv = {};
    snap.docs.forEach(d => {
      const data = d.data();
      const key = `${data.month}_${data.location}`;
      let events = [];
      try { events = JSON.parse(data.eventsJson || '[]'); } catch(e) {}
      rv[key] = { month: data.month, location: data.location, totalRevenue: data.totalRevenue || 0, totalDeposit: data.totalDeposit || 0, eventCount: data.eventCount || 0, eventsWithRevenue: data.eventsWithRevenue || 0, events, syncedAt: data.syncedAt || '' };
    });
    state.calendarRevenue = rv;
    if (state.loaded) render();
  });

  db.collection('contractNotes').onSnapshot(snap => {
    const notes = {};
    snap.docs.forEach(d => { notes[d.id] = d.data(); });
    state.contractNotes = notes;
    if (state.loaded) render();
  }, err => { console.warn('contractNotes listener error', err); });

  setTimeout(() => { state.loaded = true; render(); }, 1500);
  Promise.all([
    db.collection('artists').get(),
    db.collection('bookings').get(),
    db.collection('pipeline').get(),
    db.collection('workSchedule').get(),
    db.collection('locationConfig').get(),
    db.collection('todos').get(),
    db.collection('calendarRevenue').get(),
    db.collection('artistAvailability').get(),
    db.collection('contractNotes').get().catch(() => null),
  ]).then(() => { state.loaded = true; render(); }).catch(() => { state.loaded = true; render(); });
}

window.addEventListener('online', () => { state.online = true; render(); });
window.addEventListener('offline', () => { state.online = false; render(); });

// --- Firebase Operations Module 1 ---
async function addArtist(data) { await db.collection('artists').add(data); toast('Künstler angelegt', 'success'); }
async function updateArtist(id, data) { const { id: _, ...clean } = data; await db.collection('artists').doc(id).update(clean); toast('Gespeichert', 'success'); }
async function deleteArtist(id) {
  const batch = db.batch();
  batch.delete(db.collection('artists').doc(id));
  const bkSnap = await db.collection('bookings').where('artistId', '==', id).get();
  bkSnap.forEach(doc => batch.delete(doc.ref));
  await batch.commit();
  toast('Künstler gelöscht', 'success');
}
async function saveBooking(artistId, month, startDay, endDay, status, location, conflicts) {
  const loc = location === 'Achern' ? 'achern' : 'weil';
  const batch = db.batch();
  for (let d = startDay; d <= endDay; d++) {
    if (conflicts.includes(d) && status !== 'free') continue;
    const key = `${month}-${d}`;
    const existing = (state.bookings[loc]?.[key] || []).filter(b => b.artistId === artistId);
    existing.forEach(b => { if (b.docId) batch.delete(db.collection('bookings').doc(b.docId)); });
    if (status !== 'free') { const ref = db.collection('bookings').doc(); batch.set(ref, { artistId, month, day: d, status, location: loc }); }
  }
  await batch.commit();
  toast('Buchung gespeichert', 'success');
}
async function addCandidate(data) { await db.collection('pipeline').add(data); toast('Kandidat hinzugefügt', 'success'); }
async function updateCandidate(id, data) { const { id: _, ...clean } = data; await db.collection('pipeline').doc(id).update(clean); toast('Aktualisiert', 'success'); }
async function convertCandidate(candidate) {
  const batch = db.batch();
  const aRef = db.collection('artists').doc();
  batch.set(aRef, { name: candidate.name, status: 'active', nationality: candidate.nationality || '', phone: candidate.phone || '', email: candidate.email || '', notes: `Aus Pipeline übernommen.\n${candidate.notes || ''}`, documents: candidate.documents || [], joinDate: new Date().toISOString().split('T')[0], visaExpiry: '' });
  batch.delete(db.collection('pipeline').doc(candidate.id));
  await batch.commit();
  toast(`${candidate.name} -> Aktiver Künstler!`, 'success');
}

// --- Artist Availability ---
function getArtistAvailability(artistId, location, month) {
  const key = `${artistId}_${location}_${month}_2026`;
  return state.artistAvailability[key] || null;
}
function isArtistAvailable(artistId, location, month, day) {
  const av = getArtistAvailability(artistId, location, month);
  if (!av || !av.ranges || av.ranges.length === 0) return false;
  return av.ranges.some(r => day >= r.from && day <= r.to);
}
async function saveArtistAvailability(artistId, location, month, ranges) {
  const key = `${artistId}_${location}_${month}_2026`;
  const existing = state.artistAvailability[key];
  if (ranges.length === 0 && existing?.docId) {
    await db.collection('artistAvailability').doc(existing.docId).delete();
  } else {
    await db.collection('artistAvailability').doc(key).set({ artistId, location, month, year: 2026, ranges });
  }
  toast('Verfügbarkeit gespeichert', 'success');
}
function showAvailabilityModal(artist, location) {
  const m = state.month; const days = DAYS[m];
  const av = getArtistAvailability(artist.id, location, m);
  const existingRanges = av?.ranges || [];
  let rangesHTML = '';
  const renderRanges = (ranges) => {

// --- Firebase Operations Module 2 ---
async function setWorkStatus(artistId, location, dateStr, status) {
  const key = `${artistId}_${location}_${dateStr}`;
  if (status === 'present') {
    const existing = state.workSchedule[key];
    if (existing?.docId) await db.collection('workSchedule').doc(existing.docId).delete();
  } else {
    await db.collection('workSchedule').doc(key).set({ artistId, location, date: dateStr, status });
  }
  toast('Status saved +', 'success');
}
async function saveLocationConfig(location, config) {
  const firestoreConfig = { ...config, couples: (config.couples || []).map(p => ({ a: p[0], b: p[1] })) };
  await db.collection('locationConfig').doc(location).set(firestoreConfig);
  toast('Settings saved +', 'success');
}

async function addTodo(data) {
  data.createdAt = firebase.firestore.FieldValue.serverTimestamp();

async function updateTodo(id, data) {

}
function toggleTodoStatus(id) {

// --- Utilities ---
function getBk(loc, artistId, month, day) { const l = loc === 'Achern' ? 'achern' : 'weil'; return (state.bookings[l]?.[`${month}-${day}`] || []).find(b => b.artistId === artistId); }
function isElsewhere(curLoc, artistId, month, day) { const other = curLoc === 'Achern' ? 'weil' : 'achern'; return (state.bookings[other]?.[`${month}-${day}`] || []).find(b => b.artistId === artistId && (b.status === 'confirmed' || b.status === 'tentative')); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function getMondayOfWeek(date) { const d = new Date(date); const day = d.getDay(); const diff = day === 0 ? -6 : 1 - day; d.setDate(d.getDate() + diff); d.setHours(0, 0, 0, 0); return d; }
function getWeekDates(weekStart) { const dates = []; for (let i = 0; i < 6; i++) { const d = new Date(weekStart); d.setDate(d.getDate() + i); dates.push(d); } return dates; }
function dateToStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function strToDate(s) { const [y, mo, d] = s.split('-').map(Number); return new Date(y, mo - 1, d); }
function isToday(d) { const t = new Date(); return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate(); }
function isPast(d) { const t = new Date(); t.setHours(0,0,0,0); return d < t; }
function getWorkEntry(artistId, location, date) { return state.workSchedule[`${artistId}_${location}_${dateToStr(date)}`]; }
function getWorkStatus(artistId, location, date) { return getWorkEntry(artistId, location, date)?.status || 'present'; }
function getLocConfig(location) { const raw = state.locationConfig[location]; if (!raw) return { minStaff: 2, staffArtistIds: [], couples: [] }; const couples = (raw.couples || []).map(p => Array.isArray(p) ? p : [p.a, p.b]); return { ...raw, couples }; }
function countPresent(location, date, excludeArtistId = null) { const cfg = getLocConfig(location); return (cfg.staffArtistIds || []).filter(id => { if (id === excludeArtistId) return false; return getWorkStatus(id, location, date) === 'present'; }).length; }
function validateChange(artistId, location, date, newStatus) {
  const cfg = getLocConfig(location); const min = cfg.minStaff || 2; const cur = getWorkStatus(artistId, location, date);
  if (cur === 'present' && newStatus !== 'present') { const remaining = countPresent(location, date, artistId); if (remaining < min) return { blocked: true, msg: `Min. ${min} artists must be at the studio. Only ${remaining} would remain.` }; }
  if (newStatus === 'off') { for (const pair of (cfg.couples || [])) { if (pair.includes(artistId)) { const partner = pair.find(id => id !== artistId); if (partner && getWorkStatus(partner, location, date) === 'off') { const pa = state.artists.find(a => a.id === partner); return { blocked: false, warning: true, msg: `Your partner ${pa?.name || ''} also has this day off.` }; } } } }
  return { blocked: false };
}

// --- Toast ---
function toast(msg, type = 'info') { const el = document.createElement('div'); el.className = `toast toast-${type}`; el.textContent = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 3000); }

// --- Modals ---
function showModal(html, width = '580px') { const overlay = document.createElement('div'); overlay.className = 'overlay'; overlay.innerHTML = `<div class="modal" style="width:min(${width},92vw)">${html}</div>`; document.body.appendChild(overlay); requestAnimationFrame(() => overlay.classList.add('show')); overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(overlay); }); return overlay; }
function closeModal(overlay) { if (!overlay) return; overlay.classList.remove('show'); setTimeout(() => overlay.remove(), 150); }

  setTimeout(() => { const sel = overlay.querySelector('#ad-status'); if (sel) sel.value = artist.status || 'active'; }, 50);

function getArtistHistory(artistId) {
  const entries = [];
  for (const loc of ['achern', 'weil']) { for (const [key, bks] of Object.entries(state.bookings[loc] || {})) { for (const b of bks) { if (b.artistId === artistId) { const [m, d] = key.split('-').map(Number); entries.push({ loc: loc === 'achern' ? 'Achern' : 'Weil', month: m, day: d, status: b.status }); } } } }
  entries.sort((a, b) => a.month - b.month || a.day - b.day);
  const grouped = []; let cur = null;
  for (const e of entries) { if (cur && cur.loc === e.loc && cur.status === e.status && cur.month === e.month && e.day === cur.ed + 1) { cur.ed = e.day; } else { if (cur) grouped.push(cur); cur = { ...e, sd: e.day, ed: e.day }; } }
  if (cur) grouped.push(cur);
  return grouped;
}

// --- Booking Modal ---
function showBookingModal(artist, month, day, location) {
  const existing = getBk(location, artist.id, month, day);
  const blocked = isElsewhere(location, artist.id, month, day);
  let status = existing?.status || 'confirmed'; let rangeEnd = day;
  function getConflicts() { const c = []; for (let d = day; d <= rangeEnd; d++) { if (isElsewhere(location, artist.id, month, d)) c.push(d); } return c; }
  function renderBk() {
    const conflicts = getConflicts();
    const blockedAlert = (blocked && !existing) ? `<div class="alert alert-error">(!) Am anderen Standort gebucht!</div>` : '';
    const conflictAlert = (conflicts.length > 0 && status !== 'free') ? `<div class="alert alert-warning" style="margin-top:8px">(!) Konflikte: ${conflicts.join(', ')}.${MONTHS[month]}</div>` : '';
    const statusBtns = Object.entries(STATUS).map(([k, v]) => { const active = status === k; const color = v.bg === 'transparent' ? 'var(--text-dim)' : v.bg; const borderC = active ? (v.bg === 'transparent' ? 'var(--text-faint)' : v.bg) : 'var(--bg-input)'; const bgC = active ? (v.bg === 'transparent' ? 'var(--bg-input)' : v.bg + '22') : 'var(--bg-input)'; return `<button class="status-btn" style="color:${color};border-color:${borderC};background:${bgC}" onclick="window._bkStatus('${k}')">${v.short}</button>`; }).join('');
    return `<div style="padding:22px;width:min(400px,90vw)"><h3 style="margin:0 0 4px;font-size:17px">Buchung</h3><p style="color:var(--text-faint);font-size:12px;margin:0 0 18px">${esc(artist.name)} . ${esc(location)} . ${day}.${MONTHS[month]}</p>${blockedAlert}<div style="margin-bottom:14px"><label style="display:block;color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Status</label><div class="status-group">${statusBtns}</div></div><div style="margin-bottom:14px"><label style="display:block;color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Zeitraum: ${day}. - ${rangeEnd}.${MONTHS[month]}</label><input type="range" min="${day}" max="${DAYS[month]}" value="${rangeEnd}" oninput="window._bkRange(this.value)">${conflictAlert}</div><div style="display:flex;justify-content:flex-end;gap:10px"><button class="btn btn-secondary" onclick="closeModal(this.closest('.overlay'))">Abbrechen</button><button class="btn btn-primary" ${blocked && !existing && status !== 'free' ? 'disabled' : ''} onclick="window._bkSave()">Speichern</button></div></div>`;
  }
  const overlay = showModal(renderBk(), '420px');
  const rerender = () => { overlay.querySelector('.modal').innerHTML = renderBk(); };
  window._bkStatus = (s) => { status = s; rerender(); };
  window._bkRange = (v) => { rangeEnd = parseInt(v); rerender(); };
  window._bkSave = () => { const conflicts = getConflicts(); if (conflicts.length > 0 && status !== 'free') { if (!confirm(`Konflikte an ${conflicts.length} Tag(en). Trotzdem?`)) return; } saveBooking(artist.id, month, day, rangeEnd, status, location, conflicts); closeModal(overlay); };
}

// --- MODULE 2: Work Schedule Modals ---
function showWorkDayModal(artistId, location, dateStr) {
  const artist = state.artists.find(a => a.id === artistId); if (!artist) return;
  const date = strToDate(dateStr); if (isPast(date)) return;
  const cur = getWorkStatus(artistId, location, date); let selected = cur;
  function renderWDM() {
    const dayIdx = date.getDay() - 1; const dayName = dayIdx >= 0 && dayIdx < 6 ? WS_DAY_FULL[dayIdx] : 'Sunday';
    const dateLabel = `${date.getDate()}.${MONTHS[date.getMonth()]} . ${dayName}`;
    const locLabel = location === 'weil' ? 'Weil am Rhein' : 'Achern';
    const validation = selected !== cur ? validateChange(artistId, location, date, selected) : { blocked: false };
    const options = Object.entries(WORK_STATUS).map(([k, v]) => { const isSel = selected === k; const isDefault = k === 'present' && !getWorkEntry(artistId, location, date); return `<div class="ws-status-option ${isSel ? 'ws-sel' : ''}" style="border-color:${isSel ? v.bg : 'transparent'}" onclick="window._wdmSel('${k}')"><div class="ws-status-icon" style="background:${v.bg}20">${v.icon}</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:${v.bg}">${v.label}${isDefault ? ' <span style="color:var(--text-ghost);font-weight:400;font-size:10px">(default)</span>' : ''}</div><div style="font-size:10px;color:var(--text-muted);margin-top:1px">${v.desc}</div></div><div style="width:14px;height:14px;border-radius:50%;border:2px solid ${v.bg};background:${isSel ? v.bg : 'transparent'};flex-shrink:0"></div></div>`; }).join('');
    const alertHtml = validation.blocked ? `<div class="alert alert-error" style="margin-top:10px">(x) ${esc(validation.msg)}</div>` : validation.warning ? `<div class="alert alert-warning" style="margin-top:10px">(!) ${esc(validation.msg)}</div>` : '';
    const cfg = getLocConfig(location); const presentNow = countPresent(location, date); const staffTotal = (cfg.staffArtistIds || []).length;
    const statusSummary = staffTotal > 0 ? `<div style="margin-bottom:14px;padding:8px 12px;background:var(--bg-input);border-radius:6px;font-size:11px"><span style="color:var(--text-muted)">Today's staff: </span><span style="color:var(--green);font-weight:700">${presentNow} working</span><span style="color:var(--text-ghost)"> / ${staffTotal} total</span>${presentNow < (cfg.minStaff || 2) ? ' <span style="color:var(--red)">(!) below minimum</span>' : ''}</div>` : '';
    return `<div style="padding:22px;width:min(380px,92vw)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div><h3 style="font-size:16px;font-weight:700;margin:0 0 3px">${esc(artist.name)}</h3><p style="color:var(--text-faint);font-size:11px;margin:0">${dateLabel} . ${locLabel}</p></div><button class="modal-close" onclick="closeModal(this.closest('.overlay'))">x</button></div>${statusSummary}${options}${alertHtml}<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px"><button class="btn btn-secondary" onclick="closeModal(this.closest('.overlay'))">Cancel</button><button class="btn btn-primary" ${validation.blocked ? 'disabled' : ''} onclick="window._wdmSave()">Save</button></div></div>`;
  }
  const overlay = showModal(renderWDM(), '400px');
  const rerender = () => { overlay.querySelector('.modal').innerHTML = renderWDM(); };
  window._wdmSel = (s) => { selected = s; rerender(); };
  window._wdmSave = () => { const v = validateChange(artistId, location, date, selected); if (v.blocked) return; setWorkStatus(artistId, location, dateStr, selected); closeModal(overlay); };
}

function showWorkWeekModal(artistId, location) {
  const artist = state.artists.find(a => a.id === artistId); if (!artist) return;
  const weekDates = getWeekDates(state.workWeekStart); const cfg = getLocConfig(location); const min = cfg.minStaff || 2;
  function renderWWM() {
    const rows = weekDates.map((d, i) => { const status = getWorkStatus(artistId, location, d); const ws = WORK_STATUS[status]; const isDefault = !getWorkEntry(artistId, location, d); const past = isPast(d); const isT = isToday(d); const present = countPresent(location, d); const ok = present >= min; return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:5px;background:${isT ? 'var(--bg-hover)' : 'var(--bg-input)'}"><div style="width:36px;text-align:center"><div style="font-size:11px;font-weight:700;color:${isT ? 'var(--accent)' : 'var(--text-faint)'}">${WS_DAY_SHORT[i]}</div><div style="font-size:9px;color:var(--text-ghost)">${d.getDate()}.${MONTHS[d.getMonth()]}</div></div><div style="width:34px;height:34px;border-radius:8px;background:${ws.bg}20;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${isDefault ? '<span style="color:var(--text-ghost);font-size:12px">.</span>' : ws.icon}</div><div style="flex:1"><div style="font-size:12px;font-weight:600;color:${ws.bg}">${ws.label}${isDefault ? ' <span style="color:var(--text-ghost);font-weight:400">(default)</span>' : ''}</div><div style="font-size:9px;color:${ok ? 'var(--text-ghost)' : 'var(--red)'}">${present} present${!ok && (cfg.staffArtistIds || []).length > 0 ? ' (!) below min' : ''}</div></div>${!past ? `<button class="btn btn-secondary btn-sm" style="font-size:10px;padding:4px 8px" onclick="closeModal(document.querySelector('.overlay'));setTimeout(()=>showWorkDayModal('${artistId}','${location}','${dateToStr(d)}'),160)">Edit</button>` : `<span style="font-size:9px;color:var(--text-ghost)">past</span>`}</div>`; }).join('');
    return `<div class="modal-header"><div><div class="modal-title">${esc(artist.name)}</div><div style="color:var(--text-faint);font-size:12px;margin-top:2px">Week . ${location === 'weil' ? 'Weil am Rhein' : 'Achern'}</div></div><button class="modal-close" onclick="closeModal(this.closest('.overlay'))">x</button></div><div class="modal-body">${rows}</div>`;
  }
  showModal(renderWWM(), '440px');
}

function showWorkAdminModal(location) {
  const cfg = getLocConfig(location); let staffIds = [...(cfg.staffArtistIds || [])]; let couples = (cfg.couples || []).map(p => [...p]); let minStaff = cfg.minStaff || 2;
  function renderWAM() {
    const allActive = state.artists.filter(a => a.status !== 'archived');
    const artistChecks = allActive.map(a => { const inStaff = staffIds.includes(a.id); return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:${inStaff ? 'rgba(34,197,94,0.07)' : 'var(--bg-input)'};margin-bottom:4px;border:1px solid ${inStaff ? 'rgba(34,197,94,0.18)' : 'transparent'}"><input type="checkbox" id="staff-${a.id}" ${inStaff ? 'checked' : ''} onchange="window._wamToggle('${a.id}',this.checked)" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer"><label for="staff-${a.id}" style="flex:1;cursor:pointer;font-size:12px;font-weight:500">${esc(a.name)}</label><span style="font-size:10px;color:${ARTIST_ST[a.status]?.raw || '#64748b'};background:${ARTIST_ST[a.status]?.raw || '#64748b'}18;padding:1px 7px;border-radius:10px">${ARTIST_ST[a.status]?.label || ''}</span></div>`; }).join('');
    const coupleRows = couples.map((pair, i) => { const a1 = state.artists.find(a => a.id === pair[0]); const a2 = state.artists.find(a => a.id === pair[1]); if (!a1 || !a2) return ''; return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:rgba(167,139,250,0.07);border:1px solid rgba(167,139,250,0.2);margin-bottom:4px"><span style="font-size:14px">(heart)</span><span style="flex:1;font-size:12px;font-weight:600;color:#a78bfa">${esc(a1.name)} & ${esc(a2.name)}</span><button style="background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;line-height:1" onclick="window._wamRmCouple(${i})">×</button></div>`; }).join('');
    const staffForCouple = allActive.filter(a => staffIds.includes(a.id));
    const coupleOpts1 = staffForCouple.map(a => `<option value="${a.id}">${esc(a.name)}</option>`).join('');
    const canAddCouple = staffForCouple.length >= 2;
    return `<div class="modal-header"><div><div class="modal-title">cfg Manage Location</div><div style="color:var(--text-faint);font-size:12px;margin-top:2px">${location === 'weil' ? '[pin] Weil am Rhein' : '[pin] Achern'}</div></div><button class="modal-close" onclick="closeModal(this.closest('.overlay'))">x</button></div><div class="modal-body"><div style="margin-bottom:20px;padding:12px;background:var(--bg-input);border-radius:8px"><div style="color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Minimum Artists at Studio</div><div style="display:flex;align-items:center;gap:12px"><button onclick="window._wamDecMin()" style="background:var(--bg-hover);border:1px solid var(--border);border-radius:6px;color:var(--text);width:32px;height:32px;cursor:pointer;font-size:16px;font-family:inherit">-</button><span style="font-size:22px;font-weight:700;color:var(--accent);min-width:30px;text-align:center">${minStaff}</span><button onclick="window._wamIncMin()" style="background:var(--bg-hover);border:1px solid var(--border);border-radius:6px;color:var(--text);width:32px;height:32px;cursor:pointer;font-size:16px;font-family:inherit">+</button><span style="color:var(--text-ghost);font-size:11px">artists must be present</span></div></div><div style="margin-bottom:20px"><div style="color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Artists at this Location (${staffIds.length})</div>${artistChecks}</div><div><div style="color:var(--text-muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Couple Pairs</div>${coupleRows}${canAddCouple ? `<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center"><select id="wam-c1" style="flex:1;min-width:100px;background:var(--bg-input);border:1px solid var(--text-ghost);border-radius:6px;padding:5px 8px;color:var(--text);font-family:inherit;font-size:12px">${coupleOpts1}</select><span style="color:#a78bfa;font-size:14px">(heart)</span><select id="wam-c2" style="flex:1;min-width:100px;background:var(--bg-input);border:1px solid var(--text-ghost);border-radius:6px;padding:5px 8px;color:var(--text);font-family:inherit;font-size:12px">${coupleOpts1}</select><button class="btn btn-secondary btn-sm" onclick="window._wamAddCouple()">+ Add</button></div>` : ''}</div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal(this.closest('.overlay'))">Cancel</button><button class="btn btn-primary" onclick="window._wamSave()">Save</button></div>`;
  }
  const overlay = showModal(renderWAM(), '520px');
  const rerender = () => { overlay.querySelector('.modal').innerHTML = renderWAM(); };
  window._wamToggle = (id, checked) => { if (checked) { if (!staffIds.includes(id)) staffIds.push(id); } else { staffIds = staffIds.filter(x => x !== id); couples = couples.filter(p => !p.includes(id)); } rerender(); };
  window._wamDecMin = () => { minStaff = Math.max(1, minStaff - 1); rerender(); };
  window._wamIncMin = () => { minStaff = Math.min(10, minStaff + 1); rerender(); };
  window._wamRmCouple = (i) => { couples.splice(i, 1); rerender(); };
  window._wamAddCouple = () => { const c1 = overlay.querySelector('#wam-c1')?.value; const c2 = overlay.querySelector('#wam-c2')?.value; if (!c1 || !c2 || c1 === c2) return toast('Select two different artists', 'error'); if (couples.some(p => (p[0] === c1 && p[1] === c2) || (p[0] === c2 && p[1] === c1))) return toast('Already paired', 'warning'); couples.push([c1, c2]); rerender(); };
  window._wamSave = () => { saveLocationConfig(location, { minStaff, staffArtistIds: staffIds, couples }); closeModal(overlay); };
}

// --- Render ---
function render() {
  const app = document.getElementById('app');
  if (!state.loaded) return;
  const location = state.tab === 'achern' ? 'Achern' : 'Weil am Rhein';
  const activeCount = state.artists.filter(a => a.status === 'active').length;
  const pipeCount = state.pipeline.length;
  const readyCount = state.pipeline.filter(c => c.phase === 'visa_received').length;
  const openTodoCount = state.todos.filter(t => t.status !== 'erledigt').length;
  // Current month revenue for selected location
  const curLoc = state.tab === 'achern' ? 'achern' : 'weil';
  const curMonthRev = state.calendarRevenue[`${new Date().getMonth()}_${curLoc}`];
  const monthRevenue = curMonthRev?.totalRevenue || 0;
  let filteredArtists = state.artists.filter(a => a.status !== 'archived');
  if (state.filter !== 'all') filteredArtists = filteredArtists.filter(a => a.status === state.filter);
  const isBookingTab = state.tab === 'achern' || state.tab === 'weil';
  const isWorkTab = state.tab === 'work';
  const isTodoTab = state.tab === 'todo';

  app.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div>
          <div class="logo">Artefact Cockpit</div>
          <div class="subtitle">Dein Business-Cockpit · 2026 <span class="conn-dot ${state.online ? 'online' : 'offline'}" style="margin-left:6px" title="${state.online ? 'Online' : 'Offline'}"></span></div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-label">Aktive Künstler</div><div class="stat-value" style="color:var(--green)">${activeCount}</div></div>
        <div class="stat"><div class="stat-label">In Pipeline</div><div class="stat-value" style="color:var(--blue)">${pipeCount}</div></div>
        <div class="stat"><div class="stat-label">Visa erhalten</div><div class="stat-value" style="color:var(--yellow)">${readyCount}</div></div>
        <div class="stat"><div class="stat-label">Offene TODOs</div><div class="stat-value" style="color:var(--red)">${openTodoCount}</div></div>
        ${isBookingTab ? `<div class="stat"><div class="stat-label">${MONTHS[new Date().getMonth()]} Umsatz</div><div class="stat-value" style="color:var(--green)">${monthRevenue > 0 ? (monthRevenue >= 1000 ? (monthRevenue/1000).toFixed(1) + 'k' : monthRevenue + '€') : '-'}</div></div>` : ''}
      </div>
      <div class="tabs">
        <button class="tab ${state.tab === 'achern' ? 'active' : ''}" onclick="setTab('achern')" title="Buchung Achern">📅 Achern</button>
        <button class="tab ${state.tab === 'weil' ? 'active' : ''}" onclick="setTab('weil')" title="Buchung Weil">📅 Weil</button>
        <button class="tab ${state.tab === 'pipeline' ? 'active' : ''}" onclick="setTab('pipeline')" title="Künstler-Pipeline">⏳ Pipeline (${pipeCount})</button>
        <button class="tab ${isWorkTab ? 'active' : ''}" onclick="setTab('work')" title="Arbeitsplan / Wer-arbeitet-wann">🗓️ Arbeitsplan</button>
        <div class="tab-sep"></div>
        <button class="tab ${state.tab==='finance'?'active':''}" onclick="setTab('finance')" title="Einnahmen aus Kalender + Sheet">💰 Einnahmen</button>
        <button class="tab ${state.tab==='contracts'?'active':''}" onclick="setTab('contracts')" title="Verträge & laufende Kosten">📋 Verträge</button>
        <div class="tab-sep"></div>
        <button class="tab ${isTodoTab ? 'active' : ''}" onclick="setTab('todo')" title="Aufgaben">✅ TODO (${openTodoCount})</button>
        <div class="tab-fill"></div>
      </div>
    </div>
    <div class="content">
      ${isBookingTab ? renderBookingView(filteredArtists, location) : isWorkTab ? renderWorkScheduleView() : isTodoTab ? renderTodoView() : state.tab === 'finance' ? renderFinanceView() : state.tab === 'contracts' ? renderContractsView() : renderPipelineView()}
    </div>
  `;
}

function setTab(t) {
  state.tab = t;
  if (t === 'finance') {
    injectFinanceCSS();
    loadFinanceData();
  }
  render();
}
function setMonth(m) { state.month = m; render(); }
function setFilter(f) { state.filter = f; render(); }
function setWorkTab(loc) { state.workTab = loc; render(); }
function shiftWorkWeek(dir) { const d = new Date(state.workWeekStart); d.setDate(d.getDate() + dir * 7); state.workWeekStart = d; render(); }
function goToCurrentWeek() { state.workWeekStart = getMondayOfWeek(new Date()); render(); }
function setTodoFilter(key, val) { state.todoFilter[key] = val; render(); }
function setTodoSort(field) { if (state.todoSort.field === field) state.todoSort.dir = state.todoSort.dir === 'asc' ? 'desc' : 'asc'; else { state.todoSort.field = field; state.todoSort.dir = 'asc'; } render(); }
function toggleHideCompleted() { state.todoHideCompleted = !state.todoHideCompleted; render(); }

// --- Revenue Section ---
function formatEuro(n) { return n > 0 ? n.toLocaleString('de-DE') + '€' : '-'; }

function renderRevenueSection(location) {
  const loc = location === 'Achern' ? 'achern' : 'weil';
  const locLabel = location === 'Achern' ? 'Achern' : 'Weil am Rhein';
  const now = new Date();
  const currentMonth = now.getMonth();

  // 2 Monate zurück + aktueller + 3 Monate voraus = 6 Monate
  const months = [];
  for (let offset = -2; offset <= 3; offset++) {
    const m = currentMonth + offset;
    if (m >= 0 && m <= 11) months.push(m);
  }

  let totalAllRev = 0, totalAllDep = 0;

  const cards = months.map(m => {
    const revData = state.calendarRevenue[`${m}_${loc}`];
    const isPast = m < currentMonth;
    const isCurrent = m === currentMonth;
    const cls = isPast ? 'rv-past' : isCurrent ? 'rv-current' : 'rv-future';
    const typeLabel = isPast ? 'Umsatz' : isCurrent ? 'Laufend' : 'Erwartet';

    const totalRev = revData?.totalRevenue || 0;
    const totalDep = revData?.totalDeposit || 0;
    const remaining = totalRev - totalDep;
    const eventCount = revData?.eventCount || 0;
    const withRevenue = revData?.eventsWithRevenue || 0;

    totalAllRev += totalRev;
    totalAllDep += totalDep;

    const hasData = totalRev > 0;
    const isSelected = m === state.month;
    const hasEvents = revData && revData.events && revData.events.length > 0;
    const clickAction = hasEvents ? `setMonth(${m});showRevenueDetail(${m},'${loc}')` : `setMonth(${m})`;

    return `<div class="revenue-card ${cls}" style="${isSelected ? 'box-shadow:0 0 0 2px var(--accent);' : ''}" onclick="${clickAction}">
      <div class="revenue-card-head">
        <span class="revenue-month-label">${MONTHS[m]}</span>
        <span class="revenue-type-badge">${typeLabel}</span>
      </div>
      <div class="revenue-amount">${hasData ? formatEuro(totalRev) : '-'}</div>
      ${hasData ? `
        <div class="revenue-detail-line">AZ: ${formatEuro(totalDep)}</div>
        <div class="revenue-detail-line">Offen: ${formatEuro(remaining)}</div>
      ` : '<div class="revenue-empty">Keine Preisdaten</div>'}
      <div class="revenue-events-count">${eventCount} Termine${withRevenue > 0 ? ' · ' + withRevenue + ' mit Preis' : ''}</div>
    </div>`;
  }).join('');

  const totalOpen = totalAllRev - totalAllDep;

  return `<div class="revenue-section">
    <div class="revenue-header">
      <span class="revenue-title">Umsatz ${locLabel}</span>
      <span class="revenue-summary">Gesamt: <b>${formatEuro(totalAllRev)}</b> · Angezahlt: ${formatEuro(totalAllDep)} · Offen: ${formatEuro(totalOpen)}</span>
    </div>
    <div class="revenue-bar">${cards}</div>
  </div>`;
}

function showRevenueDetail(month, location) {
  const revData = state.calendarRevenue[`${month}_${location}`];
  if (!revData || !revData.events || revData.events.length === 0) {
    toast('Keine Umsatzdaten für diesen Monat', 'info');
    return;
  }

  const events = [...revData.events].sort((a, b) => a.date.localeCompare(b.date));
  const locLabel = location === 'achern' ? 'Achern' : 'Weil am Rhein';
  const now = new Date();
  const isPast = month < now.getMonth();
  const typeLabel = isPast ? 'Umsatz (realisiert)' : month === now.getMonth() ? 'Laufender Monat' : 'Erwarteter Umsatz';

  const rows = events.map(e => {
    const dateParts = e.date.split('-');
    const dateLabel = `${dateParts[2]}.${dateParts[1]}.`;
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-input);border-radius:6px;margin-bottom:4px">
      <span style="font-size:10px;color:var(--text-ghost);min-width:45px">${dateLabel}</span>
      <span style="flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.title)}</span>
      ${e.artistName ? `<span style="font-size:10px;color:var(--accent);white-space:nowrap">${esc(e.artistName)}</span>` : ''}
      <span style="font-size:12px;font-weight:700;color:var(--green);min-width:55px;text-align:right">${e.revenue}€</span>
      ${e.deposit > 0 ? `<span style="font-size:10px;color:var(--yellow);min-width:50px;text-align:right">AZ ${e.deposit}€</span>` : '<span style="min-width:50px"></span>'}
    </div>`;
  }).join('');

  const remaining = revData.totalRevenue - revData.totalDeposit;
  const pctPaid = revData.totalRevenue > 0 ? Math.round((revData.totalDeposit / revData.totalRevenue) * 100) : 0;

  const html = `
    <div class="modal-header">
      <div>
        <div class="modal-title">${MONTHS[month]} – ${locLabel}</div>
        <div style="color:var(--text-faint);font-size:12px;margin-top:4px">${typeLabel}</div>
      </div>
      <button class="modal-close" onclick="closeModal(this.closest('.overlay'))">x</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <div style="background:var(--bg-input);border-radius:8px;padding:10px 16px;flex:1;min-width:100px">
          <div style="font-size:9px;color:var(--text-ghost);text-transform:uppercase;font-weight:600">Gesamt</div>
          <div style="font-size:22px;font-weight:700;color:var(--green);margin-top:2px">${formatEuro(revData.totalRevenue)}</div>
        </div>
        <div style="background:var(--bg-input);border-radius:8px;padding:10px 16px;flex:1;min-width:100px">
          <div style="font-size:9px;color:var(--text-ghost);text-transform:uppercase;font-weight:600">Angezahlt</div>
          <div style="font-size:22px;font-weight:700;color:var(--yellow);margin-top:2px">${formatEuro(revData.totalDeposit)}</div>
          <div style="font-size:9px;color:var(--text-ghost);margin-top:2px">${pctPaid}% bezahlt</div>
        </div>
        <div style="background:var(--bg-input);border-radius:8px;padding:10px 16px;flex:1;min-width:100px">
          <div style="font-size:9px;color:var(--text-ghost);text-transform:uppercase;font-weight:600">Offen</div>
          <div style="font-size:22px;font-weight:700;color:var(--red);margin-top:2px">${formatEuro(remaining)}</div>
        </div>
      </div>
      <div style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;margin-bottom:8px">${events.length} Termine mit Preis</div>
      ${rows}
      ${revData.eventCount > revData.eventsWithRevenue ? `<div style="font-size:10px;color:var(--text-ghost);margin-top:10px;text-align:center">${revData.eventCount - revData.eventsWithRevenue} weitere Termine ohne Preisangabe</div>` : ''}
    </div>
  `;
  showModal(html, '600px');
}

// --- Module 1: Booking View ---
function renderBookingView(artists, location) {
  const m = state.month; const days = DAYS[m];
  const monthBtns = MONTHS.map((name, i) => `<button class="month-btn ${m === i ? 'active' : ''}" onclick="setMonth(${i})">${name}</button>`).join('');
  const filterBtns = [{ k: 'all', l: 'Alle' }, { k: 'active', l: 'Aktiv' }].map(f => `<button class="filter-btn ${state.filter === f.k ? 'active' : ''}" onclick="setFilter('${f.k}')">${f.l}</button>`).join('');
  const legendItems = Object.entries(STATUS).map(([k, v]) => { const bg = v.bg === 'transparent' ? 'var(--bg-input)' : v.bg; const border = v.bg === 'transparent' ? '1px dashed var(--text-faint)' : 'none'; return `<div class="legend-item"><div class="legend-dot" style="background:${bg};border:${border}"></div>${v.label}</div>`; }).join('');
  const legendBlocked = `<div class="legend-item"><div class="legend-dot" style="background:repeating-linear-gradient(45deg,var(--text-faint),var(--text-faint) 2px,var(--bg-input) 2px,var(--bg-input) 4px)"></div>Anderer Standort</div>`;
  let headerCells = `<div class="grid-header name-col">${MONTHS[m]}</div>`;
  for (let d = 1; d <= days; d++) { const date = new Date(2026, m, d); const we = date.getDay() === 0 || date.getDay() === 6; headerCells += `<div class="grid-header ${we ? 'weekend' : ''}">${d}</div>`; }
  let rows = '';
  artists.forEach((artist, aIdx) => {
    const bgName = aIdx % 2 === 0 ? 'var(--bg-row-even)' : 'var(--bg-row-odd)';
    const dotColor = ARTIST_ST[artist.status]?.raw || '#64748b';
    const hasAv = !!getArtistAvailability(artist.id, location, m);
    rows += `<div class="artist-name" style="background:${bgName}" onclick="showArtistDetail(state.artists.find(a=>a.id==='${artist.id}'))"><span class="artist-dot" style="background:${dotColor}"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(artist.name)}</span><span class="av-btn ${hasAv ? 'av-set' : ''}" onclick="event.stopPropagation();showAvailabilityModal(state.artists.find(a=>a.id==='${artist.id}'),'${location}')" title="Verfügbarkeit setzen">${hasAv ? '&#9679;' : '&#9675;'}</span></div>`;
    for (let d = 1; d <= days; d++) {
      const date = new Date(2026, m, d); const we = date.getDay() === 0 || date.getDay() === 6;
      const bk = getBk(location, artist.id, m, d); const blocked = isElsewhere(location, artist.id, m, d);
      let cls = 'cell'; let bg = aIdx % 2 === 0 ? 'var(--bg-row-even)' : 'var(--bg-row-odd)';
      if (we && !bk && !blocked) bg = aIdx % 2 === 0 ? '#0e1328' : '#12162a';
      if (bk) cls += ` ${STATUS[bk.status]?.cls || ''}`; else if (blocked) cls += ' blocked';
      else if (!we && isArtistAvailable(artist.id, location, m, d)) cls += ' available';
      let onclick = '';
      if (blocked && !bk) onclick = `onclick="toast('${esc(artist.name)} ist am anderen Standort gebucht','error')"`;
      else if (artist.status !== 'active') onclick = `onclick="toast('${esc(artist.name)} ist noch nicht aktiv','warning')"`;
      else onclick = `onclick="showBookingModal(state.artists.find(a=>a.id==='${artist.id}'),${m},${d},'${location}')"`;
      const style = (!bk && !blocked && !cls.includes('available')) ? `style="background:${bg}"` : '';
      rows += `<div class="${cls}" ${style} ${onclick}></div>`;
    }
  });
  const cols = `110px repeat(${days}, 1fr)`;
  return `<div class="month-bar"><div class="months">${monthBtns}</div><div class="filter-group">${filterBtns}</div></div>${renderRevenueSection(location)}<div class="legend">${legendItems}${legendBlocked}</div><div class="grid-wrapper"><div class="grid" style="grid-template-columns:${cols}">${headerCells}${rows}</div></div><div class="hint">Klick Name -> Stammdaten . Klick Zelle -> Buchung . Schraffiert = anderer Standort . Klick Monatskarte -> Umsatz-Details</div>`;
}

let dragCandidateId = null;
function renderPipelineView() {
  const grouped = {}; PHASES.forEach(p => grouped[p.key] = []);
  state.pipeline.forEach(c => { if (grouped[c.phase]) grouped[c.phase].push(c); });
  const columns = PHASES.map(phase => {
    const cards = grouped[phase.key].map(c => { const convertBtn = phase.key === 'visa_received' ? `<button class="convert-btn" onclick="event.stopPropagation();convertCandidate(state.pipeline.find(x=>x.id==='${c.id}'))">-> Als Künstler übernehmen</button>` : ''; return `<div class="candidate-card" draggable="true" ondragstart="dragCandidateId='${c.id}';this.classList.add('dragging')" ondragend="dragCandidateId=null;this.classList.remove('dragging')" onclick="showCandidateModal(state.pipeline.find(x=>x.id==='${c.id}'),false)"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span class="candidate-name">${esc(c.name)}</span><span class="candidate-nat">${esc(c.nationality || '')}</span></div>${c.specialty ? `<div class="candidate-spec">${esc(c.specialty)}</div>` : ''}${c.notes ? `<div class="candidate-notes">${esc(c.notes)}</div>` : ''}${convertBtn}</div>`; }).join('');

}
